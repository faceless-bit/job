<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端午节快乐 🐉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #8B0000, #FF4500, #FF8C00, #FFD700);
            color: white;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .background {
            position: absolute;
            inset: 0;
            background: url('https://img.freepik.com/free-vector/chinese-pattern-background_53876-100480.jpg') repeat;
            background-size: 400px;
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        canvas#fireworks { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 2; 
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-shadow: 0 0 25px gold, 0 0 50px red, 0 0 70px #ff00ff;
            animation: titleGlow 2.5s infinite alternate;
            margin: 15px 0;
            letter-spacing: 8px;
        }

        .blessing {
            font-size: 2.4rem;
            margin: 10px 0 20px;
            text-shadow: 0 0 20px white;
        }

        .images {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .image-card {
            background: rgba(255,255,255,0.18);
            border-radius: 25px;
            padding: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            cursor: pointer;
            border: 5px solid gold;
        }

        .image-card:hover {
            transform: scale(1.12) rotate(4deg);
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.6);
        }

        .image-card img {
            width: 260px;
            height: 260px;
            object-fit: contain;
            border-radius: 15px;
        }

        /* 放大模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            position: relative;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border: 12px solid gold;
            border-radius: 20px;
            box-shadow: 0 0 60px gold;
        }

        .close {
            position: absolute;
            top: -50px;
            right: 20px;
            font-size: 50px;
            cursor: pointer;
            color: white;
            text-shadow: 0 0 10px black;
        }

        /* 漂浮文字 */
        .float-text {
            position: absolute;
            font-size: 42px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 15px white;
            pointer-events: none;
            z-index: 3;
            animation: floatUp 12s linear forwards;
            opacity: 0.85;
        }

        footer {
            font-size: 1.5rem;
            text-shadow: 0 0 15px white;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 25px gold, 0 0 50px red; }
            to { text-shadow: 0 0 40px gold, 0 0 70px #ff00ff, 0 0 90px red; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-120px) rotate(25deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <canvas id="fireworks"></canvas>

    <div class="container">
        <h1>端午安康 🐉</h1>
        <div class="blessing">🌿 艾叶飘香 · 龙舟竞渡 · 粽叶芬芳 🌿</div>

        <div class="images">
            <div class="image-card" data-src="1f323d13-4683-439d-bf81-4c6e9f8da9fe.png">
                <img src="1f323d13-4683-439d-bf81-4c6e9f8da9fe.png" alt="端午节快乐">
            </div>
            <div class="image-card" data-src="307a4d6e-0ef8-4286-b37c-2a628d1b5bed.png">
                <img src="307a4d6e-0ef8-4286-b37c-2a628d1b5bed.png" alt="大家吃粽子">
            </div>
            <div class="image-card" data-src="a92b80c4-39cf-47c8-a3f1-b4cd1102ddce.png">
                <img src="a92b80c4-39cf-47c8-a3f1-b4cd1102ddce.png" alt="猪吃粽子">
            </div>
        </div>

        <footer>
            愿你粽子满满 · 幸福团圆 · 龙年大吉<br>
            Happy Dragon Boat Festival 2026
        </footer>
    </div>

    <!-- 图片放大模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="" alt="">
        </div>
    </div>

    <script>
        // 烟花
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let width, height, fireworks = [];

        class Firework { /* 同之前代码，保持简洁，这里省略部分以节省篇幅，实际使用时保持完整 */ 
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * height * 0.45;
                this.speed = 9 + Math.random() * 7;
                this.hue = Math.random() * 360;
                this.exploded = false;
                this.particles = [];
            }
            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    if (this.y <= this.targetY) this.explode();
                }
            }
            explode() {
                this.exploded = true;
                for (let i = 0; i < 90; i++) {
                    this.particles.push({
                        x: this.x, y: this.y,
                        vx: Math.random() * 13 - 6.5,
                        vy: Math.random() * 13 - 9,
                        life: 65 + Math.random() * 45,
                        hue: this.hue + Math.random() * 50 - 25,
                        size: Math.random() * 5 + 2.5
                    });
                }
            }
            draw() {
                if (!this.exploded) {
                    ctx.save();
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = `hsl(${this.hue},100%,75%)`;
                    ctx.fillStyle = `hsl(${this.hue},100%,90%)`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 7, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
                for (let i = this.particles.length-1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; p.size *= 0.975;
                    if (p.life <= 0) { this.particles.splice(i,1); continue; }
                    ctx.save();
                    ctx.globalAlpha = p.life / 90;
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = `hsl(${p.hue},100%,80%)`;
                    ctx.fillStyle = `hsl(${p.hue},100%,90%)`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < 0.18) fireworks.push(new Firework());

            for (let i = fireworks.length-1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                    fireworks.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 掉落粽子
        function dropZongzi() {
            const z = document.createElement('div');
            z.style.position = 'absolute';
            z.style.fontSize = (35 + Math.random()*45) + 'px';
            z.style.left = Math.random() * 100 + 'vw';
            z.style.top = '-80px';
            z.style.zIndex = '4';
            z.style.animation = `fall ${4 + Math.random()*6}s linear forwards`;
            z.textContent = ['🥟','🍙','🌯','🪔'][Math.floor(Math.random()*4)];
            document.body.appendChild(z);
            setTimeout(() => z.remove(), 15000);
        }
        setInterval(dropZongzi, 220);
        for (let i = 0; i < 12; i++) setTimeout(dropZongzi, i*180);

        // 漂浮文字
        const texts = ['福', '粽', '安康', '🧧', '🐉'];
        function createFloatText() {
            const t = document.createElement('div');
            t.className = 'float-text';
            t.textContent = texts[Math.floor(Math.random()*texts.length)];
            t.style.left = Math.random() * 100 + 'vw';
            t.style.animationDuration = (10 + Math.random()*8) + 's';
            t.style.opacity = 0.7 + Math.random()*0.3;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 20000);
        }
        setInterval(createFloatText, 650);

        // 点击放大图片
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const closeBtn = document.querySelector('.close');

        document.querySelectorAll('.image-card').forEach(card => {
            card.addEventListener('click', () => {
                modalImg.src = card.dataset.src;
                modal.style.display = 'flex';
            });
        });

        closeBtn.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // 点击空白处也放烟花
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'IMG' && e.target.classList.contains('image-card') === false) {
                const fw = new Firework();
                fw.x = e.clientX;
                fw.y = e.clientY + 80;
                fw.targetY = e.clientY - 80;
                fireworks.push(fw);
            }
        });
    </script>
</body>
</html>
